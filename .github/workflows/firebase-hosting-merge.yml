name: Deploy to Firebase
on:
  push:
    branches:
      - dev
      - stage

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install & Build
        run: |
          npm ci
          npm run build
      
      - name: Deploy to Dev
        if: github.ref == 'refs/heads/dev'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_UIP_CLOUDGENZ }}'
          target: dev-site
          channelId: live

      - name: Deploy to Stage
        if: github.ref == 'refs/heads/stage'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_UIP_CLOUDGENZ }}'
          target: stage-site
          channelId: live